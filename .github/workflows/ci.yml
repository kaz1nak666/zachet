name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      
      # 🔥 ШАГ 3: Передаём секреты в тесты через env
      - name: Run tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/ -v --tb=short
      
      # 🔥 ШАГ 4: Передаём секреты в Docker Compose (без .env файла!)
      - name: Run Docker Compose (if needed)
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Docker Compose step - secrets passed via env"
          # docker compose up -d  # раскомментируй, если нужно
      
      # 🔥 ШАГ 5: Проверка маскировки секретов
      - name: Check secret masking
        run: |
          echo "Password in logs: ${{ secrets.POSTGRES_PASSWORD }}"
          # В логах будет: Password in logs: ***
      
      - name: Run linter
        run: |
          pip install ruff
          ruff check .